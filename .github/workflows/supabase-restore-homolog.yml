name: Restore Homolog From Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RESTORE_HOMOLOG_FROM_PROD to overwrite homolog with a production snapshot."
        required: true
        type: string
      run_smoke:
        description: "Run homolog smoke after restore."
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: restore-homolog-database
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SMOKE_URL: ${{ vars.HOMOLOG_URL || 'https://homolog.labolita.faysk.dev' }}
  VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

jobs:
  restore:
    name: Copy production snapshot to homolog
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Confirm destructive target
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.confirm }}" != "RESTORE_HOMOLOG_FROM_PROD" ]; then
            echo "Confirmation did not match. Homolog was not touched."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Dump production data without ephemeral auth state
        shell: bash
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_HOMOLOG_DB_URL: ${{ secrets.SUPABASE_HOMOLOG_DB_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL secret is required."
            exit 1
          fi

          if [ -z "${SUPABASE_HOMOLOG_DB_URL:-}" ]; then
            echo "SUPABASE_HOMOLOG_DB_URL secret is required."
            exit 1
          fi

          if [ "$SUPABASE_DB_URL" = "$SUPABASE_HOMOLOG_DB_URL" ]; then
            echo "Production and homolog database URLs are identical. Refusing to restore."
            exit 1
          fi

          BACKUP_DIR="restore-work"
          mkdir -p "$BACKUP_DIR"

          EXCLUDES=(
            "auth.audit_log_entries"
            "auth.flow_state"
            "auth.mfa_amr_claims"
            "auth.mfa_challenges"
            "auth.mfa_factors"
            "auth.oauth_authorizations"
            "auth.oauth_client_states"
            "auth.oauth_clients"
            "auth.oauth_consents"
            "auth.one_time_tokens"
            "auth.refresh_tokens"
            "auth.saml_providers"
            "auth.saml_relay_states"
            "auth.sessions"
            "auth.sso_domains"
            "auth.sso_providers"
            "auth.webauthn_challenges"
            "auth.webauthn_credentials"
          )

          DUMP_ARGS=(
            db dump
            --db-url "$SUPABASE_DB_URL"
            --file "$BACKUP_DIR/data.sql"
            --use-copy
            --data-only
            --schema "auth,public"
          )

          for table_name in "${EXCLUDES[@]}"; do
            DUMP_ARGS+=("--exclude" "$table_name")
          done

          npx supabase "${DUMP_ARGS[@]}"

      - name: Apply homolog migrations
        shell: bash
        env:
          SUPABASE_HOMOLOG_DB_URL: ${{ secrets.SUPABASE_HOMOLOG_DB_URL }}
        run: |
          set -euo pipefail
          npx supabase db push --db-url "$SUPABASE_HOMOLOG_DB_URL" --include-all --yes

      - name: Restore production data into homolog
        shell: bash
        env:
          SUPABASE_HOMOLOG_DB_URL: ${{ secrets.SUPABASE_HOMOLOG_DB_URL }}
        run: |
          set -euo pipefail

          cat > restore-work/pre_restore.sql <<'SQL'
          begin;

          truncate table
            public.admin_audit_logs,
            public.app_settings,
            public.match_result_history,
            public.special_market_results,
            public.special_predictions,
            public.special_markets,
            public.prediction_scores,
            public.predictions,
            public.pool_members,
            public.pools,
            public.matches,
            public.teams,
            public.tournaments,
            public.profiles,
            public.results_sync_state
          cascade;

          truncate table
            auth.identities,
            auth.users
          cascade;

          commit;
          SQL

          cat > restore-work/post_restore.sql <<'SQL'
          delete from auth.flow_state;
          delete from auth.mfa_amr_claims;
          delete from auth.mfa_challenges;
          delete from auth.mfa_factors;
          delete from auth.oauth_authorizations;
          delete from auth.oauth_client_states;
          delete from auth.oauth_clients;
          delete from auth.oauth_consents;
          delete from auth.one_time_tokens;
          delete from auth.refresh_tokens;
          delete from auth.sessions;
          delete from auth.saml_relay_states;
          delete from auth.saml_providers;
          delete from auth.sso_domains;
          delete from auth.sso_providers;
          delete from auth.webauthn_challenges;
          delete from auth.webauthn_credentials;

          select public.ensure_default_special_markets();

          do $$
          begin
            if (select count(*) from public.teams) <> 48 then
              raise exception 'expected 48 teams after restore';
            end if;

            if (select count(*) from public.matches) <> 104 then
              raise exception 'expected 104 matches after restore';
            end if;

            if (select count(*) from auth.users) = 0 then
              raise exception 'expected auth users after restore';
            end if;

            if (select count(*) from public.profiles where is_master_admin) <> 1 then
              raise exception 'expected exactly one master admin after restore';
            end if;

            if (select count(*) from public.special_markets) < 9 then
              raise exception 'expected special markets after restore';
            end if;
          end $$;

          analyze;
          SQL

          psql "$SUPABASE_HOMOLOG_DB_URL" --set=ON_ERROR_STOP=1 --file restore-work/pre_restore.sql
          psql "$SUPABASE_HOMOLOG_DB_URL" --set=ON_ERROR_STOP=1 --file restore-work/data.sql
          psql "$SUPABASE_HOMOLOG_DB_URL" --set=ON_ERROR_STOP=1 --file restore-work/post_restore.sql

      - name: Run homolog smoke
        if: ${{ inputs.run_smoke }}
        run: npm run test:homolog -- --strict-sync

name: Homolog smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */4 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SMOKE_URL: ${{ vars.HOMOLOG_URL || 'https://homolog.labolita.faysk.dev' }}
  VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

jobs:
  smoke:
    name: Check homolog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:homolog
